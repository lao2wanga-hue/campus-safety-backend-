# 服务器配置
server:
  port: 8080

# Spring 配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_safety?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # ⭐ 文件上传配置（新增）
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: campusSafetySecretKey2024VeryLongString
  expiration: 86400000

# ⭐ 文件上传路径（新增）
file:
  upload:
    path: ./uploads

# 跨域配置
cors:
  allowed-origins: "*"

# 日志配置
logging:
  level:
    root: INFO
    com.campus.safety: DEBUG