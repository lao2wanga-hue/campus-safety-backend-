server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${MYSQL_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:campusSafetySecretKey2024}
  expiration: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info