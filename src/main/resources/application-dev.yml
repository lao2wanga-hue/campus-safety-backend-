# 服务器配置
server:
  port: 8080

# Spring 配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_safety?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: campusSafetySecretKey2024VeryLongString
  expiration: 86400000

# 跨域配置
cors:
  allowed-origins: "*"

# 日志配置
logging:
  level:
    root: INFO
    com.campus.safety: DEBUG