# ===================================
# 服务器配置
# ===================================
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      min-spare: 10

# ===================================
# Spring 配置
# ===================================
spring:
  application:
    name: campus-safety-backend
  
  # ===================================
  # 数据源配置
  # ===================================
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: CampusSafetyHikariCP
  
  # ===================================
  # JPA 配置
  # ===================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  
  # ===================================
  # Jackson 配置
  # ===================================
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# ===================================
# MyBatis-Plus 配置
# ===================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.safety.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true

# ===================================
# JWT 配置
# ===================================
jwt:
  secret: ${JWT_SECRET:campusSafetySecretKey2024VeryLongString}
  expiration: 86400000  # 24 小时（毫秒）
  token-prefix: "Bearer "
  header: Authorization

# ===================================
# 跨域配置
# ===================================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,HEAD
  allowed-headers: "*"
  exposed-headers: Authorization
  max-age: 3600
  allow-credentials: true

# ===================================
# Actuator 配置（健康检查）
# ===================================
management:
  server:
    port: ${PORT:8080}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,configprops
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    info:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
      threshold: 10485760  # 10MB
    ping:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# ===================================
# 日志配置
# ===================================
logging:
  level:
    root: INFO
    com.campus.safety: DEBUG
    com.campus.safety.mapper: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/campus-safety.log
    max-size: 10MB
    max-history: 30